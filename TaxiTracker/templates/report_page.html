<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Отчёт по автомобилям</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

#report-result{
    background:white;
    padding:20px;
}

</style>

</head>
<body>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">

<h2>Отчёт по автомобилям</h2>

<div>

<button onclick="downloadPDF()" class="btn btn-success me-2">
Скачать PDF
</button>

<a href="javascript:history.back()" class="btn btn-secondary">
Назад
</a>

</div>

</div>

<div id="report-result" class="mt-3">
<div class="text-muted">Загрузка отчёта...</div>
</div>

</div>

<script>

async function loadReport(){

const params=new URLSearchParams(window.location.search)

const type=params.get("type")

const apiUrl=`/api/v1/reports/${type}/?`+params.toString()

const response=await fetch(apiUrl)

const data=await response.json()

console.log("REPORT DATA:",data)

renderReport(data)

}


function renderReport(data){

const container=document.getElementById("report-result")

container.innerHTML=""

if(!data.length){

container.innerHTML=`<div class="alert alert-info">
Нет данных для выбранных автомобилей
</div>`

return

}

const grouped={}

data.forEach(row=>{

const type=row.report_type || "unknown"

grouped[type]=grouped[type] || []

grouped[type].push(row)

})


for(const [reportType,rows] of Object.entries(grouped)){

const header=document.createElement("h4")

header.className="mt-4"

header.textContent=reportType.toUpperCase()

container.appendChild(header)


rows.forEach(row=>{

const div=document.createElement("div")

div.className="card mb-2"

div.innerHTML=`

<div class="card-body">

<b>Авто:</b> ${row.vehicle}<br>
<b>Период:</b> ${row.duration}<br>
<b>Пробег (км):</b> ${row.value}

</div>

`

container.appendChild(div)

})

}

}


function downloadPDF(){

const element=document.getElementById("report-result")

const opt={
margin:10,
filename:"vehicle-report.pdf",
image:{type:"jpeg",quality:0.98},
html2canvas:{scale:2},
jsPDF:{
unit:"mm",
format:"a4",
orientation:"portrait"
}
}

html2pdf().set(opt).from(element).save()

}


loadReport()

</script>

</body>
</html>
